name: Update AMFI ISIN map

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch AMFI ISIN map
        run: python3 fetch_amfi_isin_map.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- amfi_isin_map.json; then
            echo "No changes to amfi_isin_map.json"
          else
            git add amfi_isin_map.json
            git commit -m "Update AMFI ISIN map"
            git push
          fi
