name: Fetch Stock Prices

on:
  schedule:
    # Every 15 minutes Mon–Fri during NSE hours (9:20 AM–3:30 PM IST = 3:50–10:00 UTC)
    - cron: "50 3 * * 1-5"         # 9:20 AM IST (market open)
    - cron: "*/15 4-9 * * 1-5"     # 9:30 AM–3:15 PM IST
    - cron: "0 10 * * 1-5"         # 3:30 PM IST (market close)
  push:
    paths:
      - stocksetf_mapping.json
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch stock prices
        run: python fetch_stock_prices.py

      - name: Commit updated prices
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_prices.json
          if git diff --cached --quiet; then
            echo "No price changes — skipping commit."
          else
            git commit -m "chore: update stock_prices.json [skip ci]"
            git push
          fi
