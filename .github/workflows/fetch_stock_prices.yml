name: Fetch Stock Prices

on:
  schedule:
    # Every 30 minutes Mon–Fri during NSE hours (9:20 AM–3:30 PM IST = 3:50–10:00 UTC)
    - cron: "50 3 * * 1-5"         # 9:20 AM IST (market open)
    - cron: "*/30 4-9 * * 1-5"     # 9:30 AM–3:30 PM IST, every 30 min
    - cron: "0 10 * * 1-5"         # 3:30 PM IST (market close)
    # Every 30 minutes Mon–Fri during US hours (covers EDT 13:30–20:00 UTC and
    # EST 14:30–21:00 UTC → ~7:00 PM–2:30 AM IST). Captures US intraday prices.
    - cron: "*/30 13-21 * * 1-5"   # US regular session, every 30 min
  push:
    paths:
      - stocksetf_mapping.json
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch stock prices
        run: python fetch_stock_prices.py

      - name: Commit updated prices
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_prices.json
          if git diff --cached --quiet; then
            echo "No price changes — skipping commit."
          else
            # No [skip ci]: this push must trigger the Pages deploy so the updated
            # prices are actually published to the live site. It will NOT re-trigger
            # this workflow (which only runs on stocksetf_mapping.json changes).
            git commit -m "chore: update stock_prices.json"
            git push
          fi
