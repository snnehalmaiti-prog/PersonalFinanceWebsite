<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — Wealthfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo" aria-label="Wealthfolio home">
        <span class="logo-mark" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="26" height="26" rx="7" fill="currentColor" class="logo-bg"/>
            <path d="M6 17.5L10.5 10L14 14.5L20 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        Wealthfolio
      </a>
      <div class="header-actions">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" aria-pressed="false">
          <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
        <a href="settings.html" class="btn btn-ghost">Settings</a>
        <a href="index.html" class="btn btn-ghost">Log out</a>
      </div>
    </div>
  </header>

  <main class="container settings-main">
    <h1>Overview</h1>

    <section class="settings-panel">
      <p class="muted">A snapshot of all your investments across asset classes.</p>

      <div class="overview-stats">
        <div class="overview-stat-card">
          <span class="overview-stat-label">Total Portfolio Value</span>
          <span class="overview-stat-value">—</span>
        </div>
        <div class="overview-stat-card">
          <span class="overview-stat-label">Equity</span>
          <span class="overview-stat-value">—</span>
        </div>
        <div class="overview-stat-card">
          <span class="overview-stat-label">Fixed Income</span>
          <span class="overview-stat-value">—</span>
        </div>
        <div class="overview-stat-card">
          <span class="overview-stat-label">Connected Sheets</span>
          <span class="overview-stat-value">—</span>
        </div>
      </div>

      <p class="muted small" style="margin-top:24px;">Connect your transaction sheets in <a href="settings.html">Settings</a> to populate this overview.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
